# render.yaml
#
# Render.com deployment configuration for the tradebot interactive backtest dashboard.
#
# How to deploy (free tier, ~5 minutes):
#   1. Sign up at https://render.com  (GitHub login works)
#   2. New → Web Service → connect mr-robot77/tradebot
#   3. Render reads this file automatically and deploys
#   4. Your dashboard is live at  https://<service-name>.onrender.com
#
# Documentation: https://render.com/docs/render-yaml-spec
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: tradebot-dashboard
    runtime: python
    plan: free               # change to "starter" for always-on (no sleep)
    region: oregon           # or: frankfurt, singapore, ohio, virginia

    buildCommand: pip install -r requirements-dashboard.txt
    startCommand: gunicorn backtest_dashboard:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120

    # Environment variables available at runtime
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"       # Render assigns the actual port via $PORT automatically

    # Health check – Render pings this path to decide if the deployment succeeded
    healthCheckPath: /
