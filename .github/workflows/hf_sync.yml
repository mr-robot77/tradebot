name: Sync to Hugging Face Spaces

# Pushes this repository to the HF Space on every push to main.
# Required secret (set in Settings → Secrets → Actions):
#   HF_TOKEN  – HuggingFace write token (https://huggingface.co/settings/tokens)
#
# Space URL: https://huggingface.co/spaces/mrrobot777/tradebot

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HF_USERNAME: mrrobot777
  HF_SPACE_NAME: tradebot

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepend HF Space metadata to README
        run: |
          cat .github/hf_space_header.md README.md > /tmp/hf_readme.md
          cp /tmp/hf_readme.md README.md

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git commit -m "ci: add HF Space metadata for deployment" --allow-empty
          git push \
            https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} \
            HEAD:main --force

      - name: Verify HF Space is reachable
        run: |
          SPACE_URL="https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${SPACE_URL}")
          echo "HF Space URL : ${SPACE_URL}"
          echo "HTTP status  : ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 400 ]; then
            echo "✅ Space is reachable."
          else
            echo "⚠️  Space returned HTTP ${HTTP_CODE}. It may still be building."
          fi
