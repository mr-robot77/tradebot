name: Sync to Hugging Face Spaces

# Pushes only HF-related files to the HF Space on every push to main.
# Only the files required to run the Space are synced:
#   - Dockerfile
#   - dashboard/ (app code and dependencies)
#   - README.md  (with HF Space metadata header prepended)
#
# Required secret (set in Settings → Secrets → Actions):
#   HF_TOKEN  – HuggingFace write token (https://huggingface.co/settings/tokens)
#
# Space URL: https://huggingface.co/spaces/mrrobot777/tradebot

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "dashboard/**"
      - "README.md"
      - ".github/hf_space_header.md"
  workflow_dispatch:

env:
  HF_USERNAME: mrrobot777
  HF_SPACE_NAME: tradebot

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build HF Space staging directory
        run: |
          mkdir /tmp/hf_space
          cp Dockerfile /tmp/hf_space/
          cp -r dashboard /tmp/hf_space/
          cat .github/hf_space_header.md README.md > /tmp/hf_space/README.md

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf_space
          git init
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git commit -m "ci: sync HF Space files from ${{ github.repository }}@${{ github.sha }}"
          git push \
            https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} \
            HEAD:main --force

      - name: Verify HF Space is reachable
        run: |
          SPACE_URL="https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${SPACE_URL}")
          echo "HF Space URL : ${SPACE_URL}"
          echo "HTTP status  : ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 400 ]; then
            echo "✅ Space is reachable."
          else
            echo "⚠️  Space returned HTTP ${HTTP_CODE}. It may still be building."
          fi
